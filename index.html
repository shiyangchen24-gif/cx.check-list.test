<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客戶叫貨狀態管理系統</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  // Claude 品牌配色：暖色調赤陶橘（claude）為主色，中性色統一改用偏暖的 stone 灰階
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          claude: {
            50:  '#FDF4F1',
            100: '#FBE7E0',
            200: '#F5CBBC',
            300: '#EDA98F',
            400: '#E28563',
            500: '#D97757',
            600: '#C15F3F',
            700: '#9C4A31',
            800: '#773828',
            900: '#522820'
          }
        }
      }
    }
  };
</script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Noto Sans TC', sans-serif; }
  .card-transition { transition: all .15s ease; }
  .spin { animation: spin 0.8s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #D9CFC2; border-radius: 4px; }
</style>
</head>
<body class="bg-stone-100 min-h-screen">
<div id="app"></div>

<script>
/* =====================================================================
 * 使用前設定：把下面 API_URL 換成你部署好的 GAS 網頁應用程式網址
 * (Deploy > 新增部署作業 > 網頁應用程式 之後複製 /exec 結尾的網址)
 * ===================================================================== */
const API_URL = 'https://script.google.com/macros/s/AKfycbxHyGQfTy3b8KYILMGl9o4XvpYeloq0FnTIGdCv0SduRBeEZxQjeeLj6WTTyRiIrJZ0gA/exec';

const { createApp, ref, computed, onMounted, onBeforeUnmount, watch, nextTick } = Vue;

const STATUS_NOT_ORDERED = '未叫貨';
const STATUS_ORDERED = '已叫貨';
const STATUS_NO_ORDER_TODAY = '今日不叫貨';
const STATUS_CYCLE = [STATUS_NOT_ORDERED, STATUS_ORDERED, STATUS_NO_ORDER_TODAY];

const STATUS_STYLE = {
  [STATUS_NOT_ORDERED]:    { bg: 'bg-red-50',    border: 'border-red-300',   dot: 'bg-red-500',   text: 'text-red-700',   badge: 'bg-red-100 text-red-700',     label: '未叫貨', short: '未叫' },
  [STATUS_ORDERED]:        { bg: 'bg-green-50',  border: 'border-green-300', dot: 'bg-green-500', text: 'text-green-700', badge: 'bg-green-100 text-green-700', label: '已叫貨', short: '已叫' },
  [STATUS_NO_ORDER_TODAY]: { bg: 'bg-stone-100', border: 'border-stone-300', dot: 'bg-stone-400', text: 'text-stone-600', badge: 'bg-stone-200 text-stone-600',  label: '今日不叫貨', short: '不叫' },
};

function nextStatus(cur) {
  const idx = STATUS_CYCLE.indexOf(cur);
  return STATUS_CYCLE[(idx === -1 ? 0 : idx + 1) % STATUS_CYCLE.length];
}

async function apiGet(action, params) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  Object.entries(params || {}).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString(), { method: 'GET' });
  return res.json();
}

async function apiPost(action, payload) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // 避免瀏覽器送出 CORS 預檢請求
    body: JSON.stringify(Object.assign({ action }, payload || {}))
  });
  return res.json();
}

const App = {
  setup() {
    const loading = ref(true);
    const initError = ref('');
    const currentPage = ref('daily'); // 'daily' | 'dashboard'

    const customers = ref([]);
    const todayStatus = ref({});
    const countLast6 = ref({});
    const chainGroups = ref([]);
    const responsiblePersons = ref([]);
    const historyByDate = ref({});
    const last6Dates = ref([]);
    const today = ref('');
    const syncingIds = ref(new Set());
    const toasts = ref([]);
    let toastId = 0;

    // 頁面 A 篩選器
    const searchQuery = ref('');
    const filterChain = ref('');
    const filterResponsible = ref('');

    // 管理區欄位
    const newChainName = ref('');
    const newCustomerName = ref('');
    const newCustomerChain = ref('');
    const newCustomerResponsible = ref('');
    const savingChain = ref(false);
    const savingCustomer = ref(false);

    // 頁面 C：Excel 匯入
    const workbook = ref(null);
    const excelSheetNames = ref([]);
    const selectedSheet = ref('');
    const dateCols = ref([]);            // [{ colIndex, header, date }]
    const unparsedDateHeaders = ref([]); // 無法辨識為日期的欄名
    const previewRows = ref([]);         // [{ rawName, customer, marks: { 'yyyy-MM-dd': bool } }]
    const importing = ref(false);
    const importSummary = ref(null);

    function showToast(msg, type) {
      const id = ++toastId;
      toasts.value.push({ id, msg, type: type || 'info' });
      setTimeout(() => { toasts.value = toasts.value.filter(t => t.id !== id); }, 3000);
    }

    async function loadData(silent) {
      if (!silent) loading.value = true;
      try {
        const res = await apiGet('getData');
        if (!res.ok) throw new Error(res.error || '讀取失敗');
        customers.value = res.customers;
        // 正在同步中的卡片先不要被輪詢結果蓋掉，避免畫面閃爍
        const merged = Object.assign({}, res.todayStatus);
        syncingIds.value.forEach(id => {
          if (todayStatus.value[id] !== undefined) merged[id] = todayStatus.value[id];
        });
        todayStatus.value = merged;
        countLast6.value = res.countLast6;
        chainGroups.value = res.chainGroups;
        responsiblePersons.value = res.responsiblePersons || [];
        historyByDate.value = res.historyByDate;
        last6Dates.value = res.last6Dates;
        today.value = res.today;
        initError.value = '';
      } catch (err) {
        initError.value = err.message;
        if (!silent) showToast('讀取資料失敗: ' + err.message, 'error');
      } finally {
        loading.value = false;
      }
    }

    const filteredCustomers = computed(() => {
      return customers.value.filter(c => {
        if (searchQuery.value && c.name.indexOf(searchQuery.value) === -1) return false;
        if (filterChain.value && c.chainGroup !== filterChain.value) return false;
        if (filterResponsible.value && c.responsiblePerson !== filterResponsible.value) return false;
        return true;
      });
    });

    const dashboardStats = computed(() => {
      let ordered = 0, notOrdered = 0, noOrderToday = 0;
      customers.value.forEach(c => {
        const st = todayStatus.value[c.id] || STATUS_NOT_ORDERED;
        if (st === STATUS_ORDERED) ordered++;
        else if (st === STATUS_NO_ORDER_TODAY) noOrderToday++;
        else notOrdered++;
      });
      return { ordered, notOrdered, noOrderToday, total: customers.value.length };
    });

    const chainStats = computed(() => {
      const map = {};
      customers.value.forEach(c => {
        if (!c.chainGroup) return;
        if (!map[c.chainGroup]) map[c.chainGroup] = { name: c.chainGroup, total: 0, ordered: 0 };
        map[c.chainGroup].total++;
        const st = todayStatus.value[c.id] || STATUS_NOT_ORDERED;
        if (st === STATUS_ORDERED) map[c.chainGroup].ordered++;
      });
      chainGroups.value.forEach(name => { if (!map[name]) map[name] = { name, total: 0, ordered: 0 }; });
      return Object.values(map);
    });

    // 負責人業績統計：各負責人名下客戶今日已叫貨比例
    const responsibleStats = computed(() => {
      const map = {};
      customers.value.forEach(c => {
        if (!c.responsiblePerson) return;
        if (!map[c.responsiblePerson]) map[c.responsiblePerson] = { name: c.responsiblePerson, total: 0, ordered: 0 };
        map[c.responsiblePerson].total++;
        const st = todayStatus.value[c.id] || STATUS_NOT_ORDERED;
        if (st === STATUS_ORDERED) map[c.responsiblePerson].ordered++;
      });
      return Object.values(map).sort((a, b) => a.name.localeCompare(b.name));
    });

    const historyRows = computed(() => {
      return last6Dates.value.map(d => ({
        date: d,
        ordered: (historyByDate.value[d] || {})[STATUS_ORDERED] || 0,
        notOrdered: (historyByDate.value[d] || {})[STATUS_NOT_ORDERED] || 0,
        noOrderToday: (historyByDate.value[d] || {})[STATUS_NO_ORDER_TODAY] || 0,
      }));
    });

    // ============ 統計趨勢圖（Chart.js） ============
    const trendCanvas = ref(null);
    let trendChart = null;

    function renderTrendChart() {
      if (!trendCanvas.value || typeof Chart === 'undefined') return;
      const labels = historyRows.value.map(r => r.date.slice(5));
      const datasets = [
        { label: '已叫貨', data: historyRows.value.map(r => r.ordered), backgroundColor: '#22c55e', borderRadius: 4 },
        { label: '未叫貨', data: historyRows.value.map(r => r.notOrdered), backgroundColor: '#D97757', borderRadius: 4 },
        { label: '今日不叫貨', data: historyRows.value.map(r => r.noOrderToday), backgroundColor: '#a8a29e', borderRadius: 4 }
      ];
      if (trendChart) {
        trendChart.data.labels = labels;
        trendChart.data.datasets.forEach((ds, i) => { ds.data = datasets[i].data; });
        trendChart.update();
        return;
      }
      trendChart = new Chart(trendCanvas.value.getContext('2d'), {
        type: 'bar',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } },
          scales: {
            x: { stacked: false, grid: { display: false } },
            y: { beginAtZero: true, ticks: { stepSize: 1, precision: 0 }, grid: { color: '#F5F4EE' } }
          }
        }
      });
    }

    watch(historyRows, () => { nextTick(() => renderTrendChart()); }, { deep: true });

    function statusOf(c) { return todayStatus.value[c.id] || STATUS_NOT_ORDERED; }
    function styleOf(c) { return STATUS_STYLE[statusOf(c)]; }
    function subLabel(c) { return [c.chainGroup, c.responsiblePerson].filter(Boolean).join(' · '); }

    async function cycleCard(c) {
      if (syncingIds.value.has(c.id)) return; // 防止寫入未完成時重複點擊
      const prev = statusOf(c);
      const next = nextStatus(prev);

      const s = new Set(syncingIds.value);
      s.add(c.id);
      syncingIds.value = s;
      todayStatus.value = Object.assign({}, todayStatus.value, { [c.id]: next }); // 樂觀更新畫面

      try {
        const res = await apiPost('updateStatus', { customerId: c.id, date: today.value, status: next });
        if (!res.ok) throw new Error(res.error || '更新失敗');
        let delta = 0;
        if (prev === STATUS_ORDERED && next !== STATUS_ORDERED) delta = -1;
        if (prev !== STATUS_ORDERED && next === STATUS_ORDERED) delta = 1;
        if (delta !== 0) {
          countLast6.value = Object.assign({}, countLast6.value, { [c.id]: (countLast6.value[c.id] || 0) + delta });
        }
        showToast(c.name + ' → ' + STATUS_STYLE[next].label, 'success');
      } catch (err) {
        todayStatus.value = Object.assign({}, todayStatus.value, { [c.id]: prev }); // 失敗還原
        showToast('同步失敗，已還原狀態: ' + err.message, 'error');
      } finally {
        const s2 = new Set(syncingIds.value);
        s2.delete(c.id);
        syncingIds.value = s2;
      }
    }

    async function addChainGroupSubmit() {
      const name = newChainName.value.trim();
      if (!name) return;
      savingChain.value = true;
      try {
        const res = await apiPost('addChainGroup', { name });
        if (!res.ok) throw new Error(res.error || '新增失敗');
        chainGroups.value = chainGroups.value.concat([name]);
        newChainName.value = '';
        showToast('已新增連鎖群組：' + name, 'success');
      } catch (err) {
        showToast('新增連鎖群組失敗: ' + err.message, 'error');
      } finally {
        savingChain.value = false;
      }
    }

    async function addCustomerSubmit() {
      const name = newCustomerName.value.trim();
      if (!name) return;
      savingCustomer.value = true;
      try {
        const res = await apiPost('addCustomer', {
          name,
          chainGroup: newCustomerChain.value,
          responsiblePerson: newCustomerResponsible.value.trim()
        });
        if (!res.ok) throw new Error(res.error || '新增失敗');
        customers.value = customers.value.concat([{
          id: res.id, name: res.name, chainGroup: res.chainGroup,
          responsiblePerson: res.responsiblePerson, phone: '', notes: ''
        }]);
        countLast6.value = Object.assign({}, countLast6.value, { [res.id]: 0 });
        if (res.responsiblePerson && responsiblePersons.value.indexOf(res.responsiblePerson) === -1) {
          responsiblePersons.value = responsiblePersons.value.concat([res.responsiblePerson]).sort();
        }
        newCustomerName.value = '';
        newCustomerChain.value = '';
        newCustomerResponsible.value = '';
        showToast('已新增客戶：' + name, 'success');
      } catch (err) {
        showToast('新增客戶失敗: ' + err.message, 'error');
      } finally {
        savingCustomer.value = false;
      }
    }

    async function assignChain(c, chainGroup) {
      const prevChain = c.chainGroup;
      c.chainGroup = chainGroup; // 樂觀更新
      try {
        const res = await apiPost('assignChainGroup', { customerId: c.id, chainGroup });
        if (!res.ok) throw new Error(res.error || '更新失敗');
        showToast(c.name + ' 已歸類至連鎖「' + (chainGroup || '無') + '」', 'success');
      } catch (err) {
        c.chainGroup = prevChain;
        showToast('歸類失敗: ' + err.message, 'error');
      }
    }

    async function assignResponsible(c, responsiblePerson) {
      const prev = c.responsiblePerson;
      c.responsiblePerson = responsiblePerson; // 樂觀更新
      try {
        const res = await apiPost('assignResponsiblePerson', { customerId: c.id, responsiblePerson });
        if (!res.ok) throw new Error(res.error || '更新失敗');
        if (responsiblePerson && responsiblePersons.value.indexOf(responsiblePerson) === -1) {
          responsiblePersons.value = responsiblePersons.value.concat([responsiblePerson]).sort();
        }
        showToast(c.name + ' 已指派給「' + (responsiblePerson || '無') + '」', 'success');
      } catch (err) {
        c.responsiblePerson = prev;
        showToast('指派失敗: ' + err.message, 'error');
      }
    }

    // ============ Excel 匯入邏輯 ============
    function pad2(n) { n = String(n); return n.length < 2 ? '0' + n : n; }

    function normalizeName(s) {
      return String(s || '').replace(/\s+/g, '').trim();
    }

    // 盡量把標題列的儲存格內容解析成 yyyy-MM-dd；無法辨識回傳 null
    function parseDateFlexible(raw) {
      if (raw === null || raw === undefined || raw === '') return null;
      const s = String(raw).trim();
      let m = s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})$/);
      if (m) return m[1] + '-' + pad2(m[2]) + '-' + pad2(m[3]);
      m = s.match(/^(\d{1,2})[-\/](\d{1,2})$/); // 只有月/日，沒有年份 -> 沿用「今天」所在的年份
      if (m) {
        const y = (today.value || String(new Date().getFullYear())).slice(0, 4);
        return y + '-' + pad2(m[1]) + '-' + pad2(m[2]);
      }
      const d = new Date(s);
      if (!isNaN(d.getTime())) {
        return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
      }
      return null;
    }

    function findMatchedCustomer(rawName) {
      const norm = normalizeName(rawName);
      if (!norm) return null;
      let hit = customers.value.find(c => normalizeName(c.name) === norm);
      if (hit) return hit;
      // 找不到精準相符，退而求其次做包含比對
      hit = customers.value.find(c => {
        const cn = normalizeName(c.name);
        return cn && (cn.indexOf(norm) !== -1 || norm.indexOf(cn) !== -1);
      });
      return hit || null;
    }

    function resetImportState() {
      dateCols.value = [];
      unparsedDateHeaders.value = [];
      previewRows.value = [];
      importSummary.value = null;
    }

    function handleFileChange(e) {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      resetImportState();
      const reader = new FileReader();
      reader.onload = (evt) => {
        try {
          const data = new Uint8Array(evt.target.result);
          const wb = XLSX.read(data, { type: 'array', cellDates: true });
          workbook.value = wb;
          excelSheetNames.value = wb.SheetNames;
          selectedSheet.value = wb.SheetNames[0];
          parseSheet();
        } catch (err) {
          showToast('讀取 Excel 失敗: ' + err.message, 'error');
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function parseSheet() {
      resetImportState();
      if (!workbook.value || !selectedSheet.value) return;
      const ws = workbook.value.Sheets[selectedSheet.value];
      const matrix = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: '', dateNF: 'yyyy-mm-dd' });
      if (!matrix.length) { showToast('這個工作表是空的', 'error'); return; }

      const headerRow = matrix[0].map(h => String(h == null ? '' : h).trim());
      let nameColIndex = headerRow.findIndex(h => /客戶|名稱|姓名/.test(h));
      if (nameColIndex === -1) nameColIndex = 0;

      const cols = [];
      const unparsed = [];
      headerRow.forEach((h, idx) => {
        if (idx === nameColIndex || !h) return;
        const d = parseDateFlexible(h);
        if (d) cols.push({ colIndex: idx, header: h, date: d });
        else unparsed.push(h);
      });
      cols.sort((a, b) => a.date.localeCompare(b.date));
      dateCols.value = cols;
      unparsedDateHeaders.value = unparsed;

      const rows = [];
      for (let i = 1; i < matrix.length; i++) {
        const row = matrix[i];
        const rawName = String(row[nameColIndex] == null ? '' : row[nameColIndex]).trim();
        if (!rawName) continue;
        const customer = findMatchedCustomer(rawName);
        const marks = {};
        cols.forEach(dc => {
          const val = row[dc.colIndex];
          marks[dc.date] = !!(val !== null && val !== undefined && String(val).trim() !== '');
        });
        rows.push({ rawName, customer, marks });
      }
      previewRows.value = rows;
    }

    const matchedCount = computed(() => previewRows.value.filter(r => r.customer).length);
    const unmatchedNames = computed(() => previewRows.value.filter(r => !r.customer).map(r => r.rawName));
    const totalMarkCount = computed(() => {
      let n = 0;
      previewRows.value.forEach(r => {
        if (!r.customer) return;
        dateCols.value.forEach(dc => { if (r.marks[dc.date]) n++; });
      });
      return n;
    });

    // 依目前比對結果（包含找不到的客戶）產生一份 Excel 下載，方框對應位置以 "V" 表現
    function exportPreviewExcel() {
      if (!previewRows.value.length || !dateCols.value.length) {
        showToast('尚無可匯出的比對結果，請先選擇檔案', 'error');
        return;
      }
      const header = ['客戶名稱'].concat(dateCols.value.map(dc => dc.date));
      const rows = previewRows.value.map(r => {
        const nameCell = r.rawName + (r.customer ? '' : '（找不到對應客戶）');
        const marks = dateCols.value.map(dc => (r.marks[dc.date] ? 'V' : ''));
        return [nameCell].concat(marks);
      });
      const aoa = [header].concat(rows);
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws['!cols'] = [{ wch: 20 }].concat(dateCols.value.map(() => ({ wch: 10 })));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '叫貨比對結果');
      const fileName = '叫貨比對結果_' + (today.value || todayFallback()) + '.xlsx';
      XLSX.writeFile(wb, fileName);
      showToast('已匯出 ' + fileName, 'success');
    }

    function todayFallback() {
      const d = new Date();
      return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
    }

    async function confirmImport() {
      const updates = [];
      previewRows.value.forEach(r => {
        if (!r.customer) return;
        dateCols.value.forEach(dc => {
          if (r.marks[dc.date]) updates.push({ customerId: r.customer.id, date: dc.date, status: STATUS_ORDERED });
        });
      });
      if (!updates.length) { showToast('沒有可匯入的「已叫貨」標記', 'error'); return; }

      importing.value = true;
      importSummary.value = null;
      try {
        const res = await apiPost('batchUpdateStatus', { updates });
        if (!res.ok) throw new Error(res.error || '匯入失敗');
        importSummary.value = res;
        showToast('匯入完成，共寫入 ' + res.total + ' 筆', 'success');
        await loadData(true); // 重新整理儀表板與卡片資料
      } catch (err) {
        showToast('匯入失敗: ' + err.message, 'error');
      } finally {
        importing.value = false;
      }
    }

    let pollTimer = null;
    onMounted(() => {
      loadData(false).then(() => nextTick(() => renderTrendChart()));
      pollTimer = setInterval(() => loadData(true), 25000); // 每 25 秒背景同步一次，支援多裝置
    });
    onBeforeUnmount(() => { if (pollTimer) clearInterval(pollTimer); if (trendChart) trendChart.destroy(); });

    return {
      loading, initError, currentPage,
      customers, filteredCustomers, dashboardStats, chainStats, responsibleStats, historyRows, trendCanvas,
      searchQuery, filterChain, filterResponsible, chainGroups, responsiblePersons, syncingIds, toasts, countLast6,
      newChainName, newCustomerName, newCustomerChain, newCustomerResponsible, savingChain, savingCustomer,
      statusOf, styleOf, subLabel, cycleCard, addChainGroupSubmit, addCustomerSubmit, assignChain, assignResponsible,
      loadData, today,
      excelSheetNames, selectedSheet, dateCols, unparsedDateHeaders, previewRows, importing, importSummary,
      handleFileChange, parseSheet, confirmImport, matchedCount, unmatchedNames, totalMarkCount, exportPreviewExcel
    };
  },
  template: `
  <div class="pb-16">
    <!-- Toast -->
    <div class="fixed top-4 right-4 z-50 flex flex-col gap-2 items-end">
      <div v-for="t in toasts" :key="t.id"
           class="px-4 py-2 rounded-lg shadow-lg text-sm text-white card-transition"
           :class="t.type === 'error' ? 'bg-red-500' : (t.type === 'success' ? 'bg-emerald-500' : 'bg-stone-700')">
        {{ t.msg }}
      </div>
    </div>

    <!-- 全螢幕初次載入遮罩 -->
    <div v-if="loading" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-40 flex flex-col items-center justify-center gap-3">
      <svg class="spin w-10 h-10 text-claude-500" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" opacity="0.25"/>
        <path d="M22 12a10 10 0 0 0-10-10" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
      </svg>
      <p class="text-stone-500 text-sm">讀取中，請稍候...</p>
    </div>

    <!-- Header + 雙頁面 Tab -->
    <header class="bg-gradient-to-r from-claude-600 to-claude-500 text-white sticky top-0 z-30 shadow-md">
      <div class="max-w-6xl mx-auto px-4 pt-4 flex items-center justify-between flex-wrap gap-3">
        <div>
          <h1 class="text-xl font-bold">客戶叫貨狀態管理</h1>
          <p class="text-claude-100 text-xs mt-0.5">{{ today }}・每 25 秒自動同步</p>
        </div>
        <button @click="loadData(false)" class="bg-white/15 hover:bg-white/25 text-white text-sm px-3 py-2 rounded-lg card-transition">
          手動重新整理
        </button>
      </div>
      <div class="max-w-6xl mx-auto px-4 mt-3 flex gap-1">
        <button @click="currentPage = 'daily'"
                class="px-4 py-2 text-sm font-medium rounded-t-lg card-transition"
                :class="currentPage === 'daily' ? 'bg-stone-100 text-claude-700' : 'text-claude-100 hover:bg-white/10'">
          每日叫貨作業
        </button>
        <button @click="currentPage = 'dashboard'"
                class="px-4 py-2 text-sm font-medium rounded-t-lg card-transition"
                :class="currentPage === 'dashboard' ? 'bg-stone-100 text-claude-700' : 'text-claude-100 hover:bg-white/10'">
          統計儀表板
        </button>
        <button @click="currentPage = 'import'"
                class="px-4 py-2 text-sm font-medium rounded-t-lg card-transition"
                :class="currentPage === 'import' ? 'bg-stone-100 text-claude-700' : 'text-claude-100 hover:bg-white/10'">
          匯入 Excel
        </button>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-5 space-y-5">

      <div v-if="initError" class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg p-3">
        連線失敗：{{ initError }}。請確認 API_URL 是否已設定為正確的 GAS 部署網址。
      </div>

      <!-- ============ 頁面 A：每日叫貨作業 ============ -->
      <div v-show="currentPage === 'daily'" class="space-y-4">
        <section class="flex flex-wrap gap-2 items-center bg-white rounded-xl shadow-sm border border-stone-200 p-3">
          <input v-model="searchQuery" type="text" placeholder="搜尋客戶名稱..."
                 class="border border-stone-300 rounded-lg px-3 py-1.5 text-sm flex-1 min-w-[140px]" />
          <select v-model="filterResponsible" class="border border-stone-300 rounded-lg px-3 py-1.5 text-sm">
            <option value="">全部負責人</option>
            <option v-for="p in responsiblePersons" :key="p" :value="p">{{ p }}</option>
          </select>
          <select v-model="filterChain" class="border border-stone-300 rounded-lg px-3 py-1.5 text-sm">
            <option value="">全部連鎖群組</option>
            <option v-for="g in chainGroups" :key="g" :value="g">{{ g }}</option>
          </select>
          <span class="text-xs text-stone-400 ml-auto">顯示 {{ filteredCustomers.length }} / {{ customers.length }} 位客戶</span>
        </section>

        <!-- 緊湊型客戶卡片：多欄小卡，點擊循環切換狀態 -->
        <section class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-2">
          <div v-for="c in filteredCustomers" :key="c.id"
               @click="cycleCard(c)"
               class="relative rounded-lg border p-2 cursor-pointer select-none card-transition hover:shadow"
               :class="[styleOf(c).bg, styleOf(c).border, syncingIds.has(c.id) ? 'opacity-60 pointer-events-none' : '']">
            <div v-if="syncingIds.has(c.id)" class="absolute inset-0 bg-white/40 rounded-lg flex items-center justify-center">
              <svg class="spin w-4 h-4 text-stone-500" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" opacity="0.25"/>
                <path d="M22 12a10 10 0 0 0-10-10" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="flex items-center justify-between gap-1">
              <span class="text-xs font-bold text-stone-800 truncate">{{ c.name }}</span>
              <span class="text-[10px] px-1.5 py-0.5 rounded-full font-medium whitespace-nowrap" :class="styleOf(c).badge">{{ styleOf(c).short }}</span>
            </div>
            <div class="flex items-center justify-between mt-1 gap-1">
              <span class="text-[10px] text-stone-400 truncate">{{ subLabel(c) || ' ' }}</span>
              <span class="flex gap-0.5 shrink-0">
                <span v-for="i in 6" :key="i" class="w-1.5 h-1.5 rounded-full"
                      :class="i <= (countLast6[c.id] || 0) ? 'bg-emerald-500' : 'bg-stone-200'"></span>
              </span>
            </div>
          </div>
        </section>

        <p v-if="!loading && filteredCustomers.length === 0" class="text-center text-stone-400 text-sm py-10">
          沒有符合條件的客戶
        </p>
      </div>

      <!-- ============ 頁面 B：統計儀表板 ============ -->
      <div v-show="currentPage === 'dashboard'" class="space-y-5">

        <section class="grid grid-cols-2 md:grid-cols-4 gap-3">
          <div class="bg-white rounded-xl shadow-sm border border-stone-200 p-4">
            <p class="text-stone-500 text-xs">今日已叫貨</p>
            <p class="text-2xl font-black text-green-600 mt-1">{{ dashboardStats.ordered }}</p>
          </div>
          <div class="bg-white rounded-xl shadow-sm border border-stone-200 p-4">
            <p class="text-stone-500 text-xs">今日未叫貨</p>
            <p class="text-2xl font-black text-red-600 mt-1">{{ dashboardStats.notOrdered }}</p>
          </div>
          <div class="bg-white rounded-xl shadow-sm border border-stone-200 p-4">
            <p class="text-stone-500 text-xs">今日不叫貨</p>
            <p class="text-2xl font-black text-stone-500 mt-1">{{ dashboardStats.noOrderToday }}</p>
          </div>
          <div class="bg-white rounded-xl shadow-sm border border-stone-200 p-4">
            <p class="text-stone-500 text-xs">客戶總數量</p>
            <p class="text-2xl font-black text-claude-600 mt-1">{{ dashboardStats.total }}</p>
          </div>
        </section>

        <section class="bg-white rounded-xl shadow-sm border border-stone-200 p-4">
          <h2 class="font-bold text-stone-700 mb-3 text-sm">近 6 天叫貨趨勢</h2>
          <div class="relative h-64">
            <canvas ref="trendCanvas"></canvas>
          </div>
        </section>

        <section v-if="chainStats.length" class="bg-white rounded-xl shadow-sm border border-stone-200 p-4">
          <h2 class="font-bold text-stone-700 mb-3 text-sm">連鎖店家統計</h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
            <div v-for="g in chainStats" :key="g.name" class="border border-stone-200 rounded-lg p-3">
              <p class="font-medium text-stone-700 text-sm">{{ g.name }}</p>
              <p class="text-stone-500 text-xs mt-1">已叫貨 <span class="text-green-600 font-bold">{{ g.ordered }}</span> / 總共 <span class="font-bold">{{ g.total }}</span> 間</p>
              <div class="w-full bg-stone-100 rounded-full h-2 mt-2">
                <div class="bg-green-500 h-2 rounded-full" :style="{ width: (g.total ? (g.ordered / g.total * 100) : 0) + '%' }"></div>
              </div>
            </div>
          </div>
        </section>

        <section v-if="responsibleStats.length" class="bg-white rounded-xl shadow-sm border border-stone-200 p-4">
          <h2 class="font-bold text-stone-700 mb-3 text-sm">負責人業績統計</h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
            <div v-for="p in responsibleStats" :key="p.name" class="border border-stone-200 rounded-lg p-3">
              <p class="font-medium text-stone-700 text-sm">{{ p.name }}</p>
              <p class="text-stone-500 text-xs mt-1">已叫貨 <span class="text-green-600 font-bold">{{ p.ordered }}</span> / {{ p.total }} 間</p>
              <div class="w-full bg-stone-100 rounded-full h-2 mt-2">
                <div class="bg-claude-500 h-2 rounded-full" :style="{ width: (p.total ? (p.ordered / p.total * 100) : 0) + '%' }"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="bg-white rounded-xl shadow-sm border border-stone-200 p-4 overflow-x-auto">
          <h2 class="font-bold text-stone-700 mb-3 text-sm">近 6 天歷史統計</h2>
          <table class="w-full text-sm min-w-[480px]">
            <thead>
              <tr class="text-stone-500 text-xs border-b border-stone-200">
                <th class="text-left py-2 font-medium">日期</th>
                <th class="text-right py-2 font-medium text-green-600">已叫貨</th>
                <th class="text-right py-2 font-medium text-red-600">未叫貨</th>
                <th class="text-right py-2 font-medium text-stone-500">今日不叫貨</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="row in historyRows" :key="row.date" class="border-b border-stone-100 last:border-0">
                <td class="py-2 text-stone-700">{{ row.date }}</td>
                <td class="py-2 text-right text-green-600 font-semibold">{{ row.ordered }}</td>
                <td class="py-2 text-right text-red-600 font-semibold">{{ row.notOrdered }}</td>
                <td class="py-2 text-right text-stone-500 font-semibold">{{ row.noOrderToday }}</td>
              </tr>
            </tbody>
          </table>
        </section>

        <!-- 管理介面：新增連鎖店家 / 新增客戶 / 動態歸類客戶 -->
        <section class="bg-white rounded-xl shadow-sm border border-stone-200 p-4 space-y-5">
          <h2 class="font-bold text-stone-700 text-sm">管理設定</h2>

          <div>
            <h3 class="font-semibold text-stone-600 text-xs mb-2">新增連鎖群組</h3>
            <div class="flex gap-2">
              <input v-model="newChainName" type="text" placeholder="例如：連鎖A"
                     class="border border-stone-300 rounded-lg px-3 py-2 text-sm flex-1" />
              <button @click="addChainGroupSubmit" :disabled="savingChain"
                      class="bg-claude-600 hover:bg-claude-700 text-white text-sm px-4 py-2 rounded-lg disabled:opacity-50">新增</button>
            </div>
          </div>

          <div>
            <h3 class="font-semibold text-stone-600 text-xs mb-2">新增客戶</h3>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
              <input v-model="newCustomerName" type="text" placeholder="客戶名稱"
                     class="border border-stone-300 rounded-lg px-3 py-2 text-sm" />
              <select v-model="newCustomerChain" class="border border-stone-300 rounded-lg px-3 py-2 text-sm">
                <option value="">不歸類連鎖群組</option>
                <option v-for="g in chainGroups" :key="g" :value="g">{{ g }}</option>
              </select>
              <input v-model="newCustomerResponsible" list="responsibleList" type="text" placeholder="負責人（可自訂）"
                     class="border border-stone-300 rounded-lg px-3 py-2 text-sm" />
            </div>
            <button @click="addCustomerSubmit" :disabled="savingCustomer"
                    class="mt-2 bg-claude-600 hover:bg-claude-700 text-white text-sm px-4 py-2 rounded-lg w-full sm:w-auto disabled:opacity-50">新增客戶</button>
          </div>

          <div>
            <h3 class="font-semibold text-stone-600 text-xs mb-2">客戶歸類（連鎖群組 / 負責人）</h3>
            <div class="space-y-2 max-h-96 overflow-y-auto">
              <div v-for="c in customers" :key="c.id" class="grid grid-cols-1 sm:grid-cols-3 gap-2 items-center border border-stone-200 rounded-lg px-3 py-2">
                <span class="text-sm text-stone-700 truncate">{{ c.name }}</span>
                <select :value="c.chainGroup" @change="assignChain(c, $event.target.value)"
                        class="border border-stone-300 rounded-lg px-2 py-1 text-xs">
                  <option value="">無連鎖</option>
                  <option v-for="g in chainGroups" :key="g" :value="g">{{ g }}</option>
                </select>
                <input :value="c.responsiblePerson" list="responsibleList"
                       @change="assignResponsible(c, $event.target.value)"
                       type="text" placeholder="負責人"
                       class="border border-stone-300 rounded-lg px-2 py-1 text-xs" />
              </div>
            </div>
          </div>

          <datalist id="responsibleList">
            <option v-for="p in responsiblePersons" :key="p" :value="p"></option>
          </datalist>
        </section>
      </div>

      <!-- ============ 頁面 C：匯入 Excel ============ -->
      <div v-show="currentPage === 'import'" class="space-y-4">
        <section class="bg-white rounded-xl shadow-sm border border-stone-200 p-4 space-y-3">
          <h2 class="font-bold text-stone-700 text-sm">匯入 Excel（客戶 x 日期矩陣）</h2>
          <p class="text-xs text-stone-500 leading-relaxed">
            檔案格式：第一列為標題列，其中一欄是客戶名稱（欄名建議含「客戶」或「名稱」），其餘每一欄代表一個日期（例如 2026/7/13 或 7/13）。
            儲存格只要「不是空白」（例如填 V、✓、1 皆可）就會被視為當天已叫貨，空白儲存格則不會變動系統內原本的狀態。
            比對完成後，可以按「確認匯入」把結果寫進 Google 試算表，也可以按「匯出 Excel」下載一份比對結果檔案，找到的客戶與日期會在對應方框顯示「V」。
          </p>
          <input type="file" accept=".xlsx,.xls" @change="handleFileChange"
                 class="text-sm border border-stone-300 rounded-lg px-3 py-2 w-full" />

          <div v-if="excelSheetNames.length > 1" class="flex items-center gap-2">
            <span class="text-xs text-stone-500">工作表：</span>
            <select v-model="selectedSheet" @change="parseSheet" class="border border-stone-300 rounded-lg px-2 py-1 text-sm">
              <option v-for="s in excelSheetNames" :key="s" :value="s">{{ s }}</option>
            </select>
          </div>

          <div v-if="unparsedDateHeaders.length" class="bg-amber-50 border border-amber-200 text-amber-700 text-xs rounded-lg p-2">
            以下欄位無法辨識為日期，已略過：{{ unparsedDateHeaders.join('、') }}
          </div>
        </section>

        <section v-if="previewRows.length" class="bg-white rounded-xl shadow-sm border border-stone-200 p-4 space-y-3">
          <div class="flex flex-wrap items-center gap-4 text-xs text-stone-600">
            <span>辨識日期欄位 <b class="text-claude-600">{{ dateCols.length }}</b> 個</span>
            <span>比對到客戶 <b class="text-green-600">{{ matchedCount }}</b> / {{ previewRows.length }} 列</span>
            <span>將寫入「已叫貨」標記 <b class="text-claude-600">{{ totalMarkCount }}</b> 筆</span>
          </div>

          <div v-if="unmatchedNames.length" class="bg-red-50 border border-red-200 text-red-700 text-xs rounded-lg p-2">
            找不到對應客戶（系統中無此名稱，請確認拼字或先在「統計儀表板」新增客戶）：{{ unmatchedNames.join('、') }}
          </div>

          <div class="overflow-x-auto border border-stone-200 rounded-lg">
            <table class="text-xs min-w-max">
              <thead>
                <tr class="bg-stone-50">
                  <th class="sticky left-0 bg-stone-50 text-left px-2 py-2 font-medium text-stone-600 border-b border-stone-200 min-w-[120px]">客戶名稱</th>
                  <th v-for="dc in dateCols" :key="dc.date" class="px-2 py-2 font-medium text-stone-600 border-b border-stone-200 text-center whitespace-nowrap" :title="dc.date">
                    {{ dc.date.slice(5) }}
                  </th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="r in previewRows" :key="r.rawName" class="border-b border-stone-100 last:border-0" :class="!r.customer ? 'opacity-50' : ''">
                  <td class="sticky left-0 bg-white px-2 py-1.5 font-medium text-stone-700 whitespace-nowrap">
                    {{ r.rawName }}
                    <span v-if="!r.customer" class="text-red-500 text-[10px] ml-1">(找不到)</span>
                  </td>
                  <td v-for="dc in dateCols" :key="dc.date" class="px-2 py-1.5 text-center">
                    <span class="inline-flex items-center justify-center w-5 h-5 rounded border text-[10px] font-bold"
                          :class="r.marks[dc.date] ? 'bg-green-500 border-green-500 text-white' : 'bg-stone-50 border-stone-200 text-transparent'">V</span>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="flex flex-wrap gap-2">
            <button @click="confirmImport" :disabled="importing || totalMarkCount === 0"
                    class="bg-claude-600 hover:bg-claude-700 text-white text-sm px-5 py-2.5 rounded-lg disabled:opacity-50 flex items-center gap-2">
              <svg v-if="importing" class="spin w-4 h-4" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" opacity="0.25"/>
                <path d="M22 12a10 10 0 0 0-10-10" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
              </svg>
              {{ importing ? '匯入中...' : '確認匯入（寫入系統）' }}
            </button>
            <button @click="exportPreviewExcel"
                    class="bg-white border border-stone-300 text-stone-700 text-sm px-5 py-2.5 rounded-lg hover:bg-stone-50">
              匯出 Excel（方框顯示 V）
            </button>
          </div>

          <div v-if="importSummary" class="bg-emerald-50 border border-emerald-200 text-emerald-700 text-xs rounded-lg p-2">
            匯入完成：更新 {{ importSummary.updated }} 筆、新增 {{ importSummary.appended }} 筆（共 {{ importSummary.total }} 筆）。
          </div>
        </section>
      </div>
    </main>
  </div>
  `
};

createApp(App).mount('#app');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客戶叫貨狀態管理系統</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Noto Sans TC', sans-serif; }
  .card-transition { transition: all .15s ease; }
  .spin { animation: spin 0.8s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
</style>
</head>
<body class="bg-slate-100 min-h-screen">
<div id="app"></div>

<script>
/* =====================================================================
 * 使用前設定：把下面 API_URL 換成你部署好的 GAS 網頁應用程式網址
 * (Deploy > 新增部署作業 > 網頁應用程式 之後複製 /exec 結尾的網址)
 * ===================================================================== */
const API_URL = 'https://script.google.com/macros/s/AKfycbxHyGQfTy3b8KYILMGl9o4XvpYeloq0FnTIGdCv0SduRBeEZxQjeeLj6WTTyRiIrJZ0gA/exec';

const { createApp, ref, reactive, computed, onMounted, onBeforeUnmount } = Vue;

const STATUS_NOT_ORDERED = '未叫貨';
const STATUS_ORDERED = '已叫貨';
const STATUS_NO_ORDER_TODAY = '今日不叫貨';
const STATUS_CYCLE = [STATUS_NOT_ORDERED, STATUS_ORDERED, STATUS_NO_ORDER_TODAY];

const STATUS_STYLE = {
  [STATUS_NOT_ORDERED]:   { bg: 'bg-red-50',    border: 'border-red-300',    dot: 'bg-red-500',    text: 'text-red-700',    label: '未叫貨' },
  [STATUS_ORDERED]:       { bg: 'bg-green-50',  border: 'border-green-300',  dot: 'bg-green-500',  text: 'text-green-700',  label: '已叫貨' },
  [STATUS_NO_ORDER_TODAY]:{ bg: 'bg-slate-100', border: 'border-slate-300', dot: 'bg-slate-400',   text: 'text-slate-600',  label: '今日不叫貨' },
};

function nextStatus(cur) {
  const idx = STATUS_CYCLE.indexOf(cur);
  return STATUS_CYCLE[(idx === -1 ? 0 : idx + 1) % STATUS_CYCLE.length];
}

async function apiGet(action, params) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  Object.entries(params || {}).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString(), { method: 'GET' });
  return res.json();
}

async function apiPost(action, payload) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // 避免瀏覽器送出 CORS 預檢請求
    body: JSON.stringify(Object.assign({ action }, payload || {}))
  });
  return res.json();
}

const App = {
  setup() {
    const loading = ref(true);
    const initError = ref('');
    const customers = ref([]);
    const todayStatus = ref({});
    const countLast6 = ref({});
    const chainGroups = ref([]);
    const historyByDate = ref({});
    const last6Dates = ref([]);
    const today = ref('');
    const syncingIds = ref(new Set());
    const toasts = ref([]);
    let toastId = 0;

    const searchQuery = ref('');
    const filterChain = ref('');
    const filterStatus = ref('');
    const showManagePanel = ref(false);
    const newChainName = ref('');
    const newCustomerName = ref('');
    const newCustomerChain = ref('');
    const savingChain = ref(false);
    const savingCustomer = ref(false);

    function showToast(msg, type) {
      const id = ++toastId;
      toasts.value.push({ id, msg, type: type || 'info' });
      setTimeout(() => {
        toasts.value = toasts.value.filter(t => t.id !== id);
      }, 3000);
    }

    async function loadData(silent) {
      if (!silent) loading.value = true;
      try {
        const res = await apiGet('getData');
        if (!res.ok) throw new Error(res.error || '讀取失敗');
        customers.value = res.customers;
        // 正在同步中的卡片先不要被輪詢結果蓋掉，避免畫面閃爍
        const merged = Object.assign({}, res.todayStatus);
        syncingIds.value.forEach(id => {
          if (todayStatus.value[id] !== undefined) merged[id] = todayStatus.value[id];
        });
        todayStatus.value = merged;
        countLast6.value = res.countLast6;
        chainGroups.value = res.chainGroups;
        historyByDate.value = res.historyByDate;
        last6Dates.value = res.last6Dates;
        today.value = res.today;
        initError.value = '';
      } catch (err) {
        initError.value = err.message;
        if (!silent) showToast('讀取資料失敗: ' + err.message, 'error');
      } finally {
        loading.value = false;
      }
    }

    const filteredCustomers = computed(() => {
      return customers.value.filter(c => {
        if (searchQuery.value && c.name.indexOf(searchQuery.value) === -1) return false;
        if (filterChain.value && c.chainGroup !== filterChain.value) return false;
        if (filterStatus.value) {
          const st = todayStatus.value[c.id] || STATUS_NOT_ORDERED;
          if (st !== filterStatus.value) return false;
        }
        return true;
      });
    });

    const dashboardStats = computed(() => {
      let ordered = 0, notOrdered = 0, noOrderToday = 0;
      customers.value.forEach(c => {
        const st = todayStatus.value[c.id] || STATUS_NOT_ORDERED;
        if (st === STATUS_ORDERED) ordered++;
        else if (st === STATUS_NO_ORDER_TODAY) noOrderToday++;
        else notOrdered++;
      });
      return { ordered, notOrdered, noOrderToday, total: customers.value.length };
    });

    const chainStats = computed(() => {
      const map = {};
      customers.value.forEach(c => {
        if (!c.chainGroup) return;
        if (!map[c.chainGroup]) map[c.chainGroup] = { name: c.chainGroup, total: 0, ordered: 0 };
        map[c.chainGroup].total++;
        const st = todayStatus.value[c.id] || STATUS_NOT_ORDERED;
        if (st === STATUS_ORDERED) map[c.chainGroup].ordered++;
      });
      // 確保沒有客戶的連鎖群組也會顯示 (total=0)
      chainGroups.value.forEach(name => {
        if (!map[name]) map[name] = { name, total: 0, ordered: 0 };
      });
      return Object.values(map);
    });

    const historyRows = computed(() => {
      return last6Dates.value.map(d => ({
        date: d,
        ordered: (historyByDate.value[d] || {})[STATUS_ORDERED] || 0,
        notOrdered: (historyByDate.value[d] || {})[STATUS_NOT_ORDERED] || 0,
        noOrderToday: (historyByDate.value[d] || {})[STATUS_NO_ORDER_TODAY] || 0,
      }));
    });

    function statusOf(c) {
      return todayStatus.value[c.id] || STATUS_NOT_ORDERED;
    }

    function styleOf(c) {
      return STATUS_STYLE[statusOf(c)];
    }

    async function cycleCard(c) {
      if (syncingIds.value.has(c.id)) return; // 防止寫入未完成時重複點擊
      const prev = statusOf(c);
      const next = nextStatus(prev);

      const s = new Set(syncingIds.value);
      s.add(c.id);
      syncingIds.value = s;
      todayStatus.value = Object.assign({}, todayStatus.value, { [c.id]: next }); // 樂觀更新畫面

      try {
        const res = await apiPost('updateStatus', { customerId: c.id, date: today.value, status: next });
        if (!res.ok) throw new Error(res.error || '更新失敗');
        // 今天必定落在近 6 天範圍內，即時調整次數統計
        let delta = 0;
        if (prev === STATUS_ORDERED && next !== STATUS_ORDERED) delta = -1;
        if (prev !== STATUS_ORDERED && next === STATUS_ORDERED) delta = 1;
        if (delta !== 0) {
          countLast6.value = Object.assign({}, countLast6.value, { [c.id]: (countLast6.value[c.id] || 0) + delta });
        }
        showToast(c.name + ' → ' + STATUS_STYLE[next].label, 'success');
      } catch (err) {
        todayStatus.value = Object.assign({}, todayStatus.value, { [c.id]: prev }); // 失敗還原
        showToast('同步失敗，已還原狀態: ' + err.message, 'error');
      } finally {
        const s2 = new Set(syncingIds.value);
        s2.delete(c.id);
        syncingIds.value = s2;
      }
    }

    async function addChainGroupSubmit() {
      const name = newChainName.value.trim();
      if (!name) return;
      savingChain.value = true;
      try {
        const res = await apiPost('addChainGroup', { name });
        if (!res.ok) throw new Error(res.error || '新增失敗');
        chainGroups.value = chainGroups.value.concat([name]);
        newChainName.value = '';
        showToast('已新增連鎖群組：' + name, 'success');
      } catch (err) {
        showToast('新增連鎖群組失敗: ' + err.message, 'error');
      } finally {
        savingChain.value = false;
      }
    }

    async function addCustomerSubmit() {
      const name = newCustomerName.value.trim();
      if (!name) return;
      savingCustomer.value = true;
      try {
        const res = await apiPost('addCustomer', { name, chainGroup: newCustomerChain.value });
        if (!res.ok) throw new Error(res.error || '新增失敗');
        customers.value = customers.value.concat([{ id: res.id, name: res.name, chainGroup: res.chainGroup, phone: '', notes: '' }]);
        countLast6.value = Object.assign({}, countLast6.value, { [res.id]: 0 });
        newCustomerName.value = '';
        newCustomerChain.value = '';
        showToast('已新增客戶：' + name, 'success');
      } catch (err) {
        showToast('新增客戶失敗: ' + err.message, 'error');
      } finally {
        savingCustomer.value = false;
      }
    }

    async function assignChain(c, chainGroup) {
      const prevChain = c.chainGroup;
      c.chainGroup = chainGroup; // 樂觀更新
      try {
        const res = await apiPost('assignChainGroup', { customerId: c.id, chainGroup });
        if (!res.ok) throw new Error(res.error || '更新失敗');
        showToast(c.name + ' 已歸類至「' + (chainGroup || '無') + '」', 'success');
      } catch (err) {
        c.chainGroup = prevChain;
        showToast('歸類失敗: ' + err.message, 'error');
      }
    }

    let pollTimer = null;
    onMounted(() => {
      loadData(false);
      pollTimer = setInterval(() => loadData(true), 25000); // 每 25 秒背景同步一次，支援多裝置
    });
    onBeforeUnmount(() => { if (pollTimer) clearInterval(pollTimer); });

    return {
      loading, initError, customers, filteredCustomers, dashboardStats, chainStats, historyRows,
      searchQuery, filterChain, filterStatus, chainGroups, syncingIds, toasts, countLast6,
      showManagePanel, newChainName, newCustomerName, newCustomerChain, savingChain, savingCustomer,
      statusOf, styleOf, cycleCard, addChainGroupSubmit, addCustomerSubmit, assignChain,
      loadData, today, STATUS_NOT_ORDERED, STATUS_ORDERED, STATUS_NO_ORDER_TODAY
    };
  },
  template: `
  <div class="pb-16">
    <!-- Toast -->
    <div class="fixed top-4 right-4 z-50 flex flex-col gap-2 items-end">
      <div v-for="t in toasts" :key="t.id"
           class="px-4 py-2 rounded-lg shadow-lg text-sm text-white card-transition"
           :class="t.type === 'error' ? 'bg-red-500' : (t.type === 'success' ? 'bg-emerald-500' : 'bg-slate-700')">
        {{ t.msg }}
      </div>
    </div>

    <!-- 全螢幕初次載入遮罩 -->
    <div v-if="loading" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-40 flex flex-col items-center justify-center gap-3">
      <svg class="spin w-10 h-10 text-indigo-500" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" opacity="0.25"/>
        <path d="M22 12a10 10 0 0 0-10-10" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
      </svg>
      <p class="text-slate-500 text-sm">讀取中，請稍候...</p>
    </div>

    <!-- Header -->
    <header class="bg-gradient-to-r from-indigo-600 to-indigo-500 text-white sticky top-0 z-30 shadow-md">
      <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between flex-wrap gap-3">
        <div>
          <h1 class="text-xl font-bold">客戶叫貨狀態管理</h1>
          <p class="text-indigo-100 text-xs mt-0.5">{{ today }}・每 25 秒自動與 Google 試算表同步</p>
        </div>
        <div class="flex items-center gap-2">
          <button @click="loadData(false)" class="bg-white/15 hover:bg-white/25 text-white text-sm px-3 py-2 rounded-lg card-transition">
            手動重新整理
          </button>
          <button @click="showManagePanel = true" class="bg-white text-indigo-600 font-medium text-sm px-3 py-2 rounded-lg hover:bg-indigo-50 card-transition">
            管理 / 新增
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-6 space-y-6">

      <div v-if="initError" class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg p-3">
        連線失敗：{{ initError }}。請確認 API_URL 是否已設定為正確的 GAS 部署網址。
      </div>

      <!-- Dashboard -->
      <section class="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
          <p class="text-slate-500 text-xs">今日已叫貨</p>
          <p class="text-2xl font-black text-green-600 mt-1">{{ dashboardStats.ordered }}</p>
        </div>
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
          <p class="text-slate-500 text-xs">今日未叫貨</p>
          <p class="text-2xl font-black text-red-600 mt-1">{{ dashboardStats.notOrdered }}</p>
        </div>
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
          <p class="text-slate-500 text-xs">今日不叫貨</p>
          <p class="text-2xl font-black text-slate-500 mt-1">{{ dashboardStats.noOrderToday }}</p>
        </div>
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
          <p class="text-slate-500 text-xs">客戶總數量</p>
          <p class="text-2xl font-black text-indigo-600 mt-1">{{ dashboardStats.total }}</p>
        </div>
      </section>

      <!-- 連鎖店統計 -->
      <section v-if="chainStats.length" class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
        <h2 class="font-bold text-slate-700 mb-3 text-sm">連鎖店家統計</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
          <div v-for="g in chainStats" :key="g.name" class="border border-slate-200 rounded-lg p-3">
            <p class="font-medium text-slate-700 text-sm">{{ g.name }}</p>
            <p class="text-slate-500 text-xs mt-1">已叫貨 <span class="text-green-600 font-bold">{{ g.ordered }}</span> / 總共 <span class="font-bold">{{ g.total }}</span> 間</p>
            <div class="w-full bg-slate-100 rounded-full h-2 mt-2">
              <div class="bg-green-500 h-2 rounded-full" :style="{ width: (g.total ? (g.ordered / g.total * 100) : 0) + '%' }"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- 近 6 天歷史統計 -->
      <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 overflow-x-auto">
        <h2 class="font-bold text-slate-700 mb-3 text-sm">近 6 天歷史統計</h2>
        <table class="w-full text-sm min-w-[480px]">
          <thead>
            <tr class="text-slate-500 text-xs border-b border-slate-200">
              <th class="text-left py-2 font-medium">日期</th>
              <th class="text-right py-2 font-medium text-green-600">已叫貨</th>
              <th class="text-right py-2 font-medium text-red-600">未叫貨</th>
              <th class="text-right py-2 font-medium text-slate-500">今日不叫貨</th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="row in historyRows" :key="row.date" class="border-b border-slate-100 last:border-0">
              <td class="py-2 text-slate-700">{{ row.date }}</td>
              <td class="py-2 text-right text-green-600 font-semibold">{{ row.ordered }}</td>
              <td class="py-2 text-right text-red-600 font-semibold">{{ row.notOrdered }}</td>
              <td class="py-2 text-right text-slate-500 font-semibold">{{ row.noOrderToday }}</td>
            </tr>
          </tbody>
        </table>
      </section>

      <!-- 篩選列 -->
      <section class="flex flex-wrap gap-2 items-center">
        <input v-model="searchQuery" type="text" placeholder="搜尋客戶名稱..."
               class="border border-slate-300 rounded-lg px-3 py-2 text-sm flex-1 min-w-[160px]" />
        <select v-model="filterChain" class="border border-slate-300 rounded-lg px-3 py-2 text-sm">
          <option value="">全部連鎖群組</option>
          <option v-for="g in chainGroups" :key="g" :value="g">{{ g }}</option>
        </select>
        <select v-model="filterStatus" class="border border-slate-300 rounded-lg px-3 py-2 text-sm">
          <option value="">全部狀態</option>
          <option :value="STATUS_NOT_ORDERED">未叫貨</option>
          <option :value="STATUS_ORDERED">已叫貨</option>
          <option :value="STATUS_NO_ORDER_TODAY">今日不叫貨</option>
        </select>
      </section>

      <!-- 客戶卡片 -->
      <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
        <div v-for="c in filteredCustomers" :key="c.id"
             @click="cycleCard(c)"
             class="relative rounded-xl border-2 p-4 cursor-pointer select-none card-transition hover:shadow-md"
             :class="[styleOf(c).bg, styleOf(c).border, syncingIds.has(c.id) ? 'opacity-60 pointer-events-none' : '']">
          <div v-if="syncingIds.has(c.id)" class="absolute inset-0 bg-white/40 rounded-xl flex items-center justify-center">
            <svg class="spin w-6 h-6 text-slate-500" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" opacity="0.25"/>
              <path d="M22 12a10 10 0 0 0-10-10" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="flex items-start justify-between gap-2">
            <div>
              <p class="font-bold text-slate-800">{{ c.name }}</p>
              <p v-if="c.chainGroup" class="text-xs text-slate-400 mt-0.5">{{ c.chainGroup }}</p>
            </div>
            <span class="w-3 h-3 rounded-full mt-1" :class="styleOf(c).dot"></span>
          </div>
          <p class="mt-3 text-sm font-semibold" :class="styleOf(c).text">{{ styleOf(c).label }}</p>
          <p class="text-xs text-slate-400 mt-1">近 6 天叫貨 <span class="font-semibold text-slate-500">{{ countLast6[c.id] || 0 }} / 6</span> 次</p>
        </div>
      </section>

      <p v-if="!loading && filteredCustomers.length === 0" class="text-center text-slate-400 text-sm py-10">
        沒有符合條件的客戶
      </p>
    </main>

    <!-- 管理面板 -->
    <div v-if="showManagePanel" class="fixed inset-0 bg-black/40 z-40 flex justify-end" @click.self="showManagePanel = false">
      <div class="bg-white w-full max-w-md h-full overflow-y-auto shadow-2xl p-5 space-y-6">
        <div class="flex items-center justify-between">
          <h2 class="font-bold text-lg text-slate-800">管理 / 新增</h2>
          <button @click="showManagePanel = false" class="text-slate-400 hover:text-slate-600 text-xl leading-none">&times;</button>
        </div>

        <div>
          <h3 class="font-semibold text-slate-700 text-sm mb-2">新增連鎖群組</h3>
          <div class="flex gap-2">
            <input v-model="newChainName" type="text" placeholder="例如：連鎖A"
                   class="border border-slate-300 rounded-lg px-3 py-2 text-sm flex-1" />
            <button @click="addChainGroupSubmit" :disabled="savingChain"
                    class="bg-indigo-600 text-white text-sm px-4 py-2 rounded-lg disabled:opacity-50">新增</button>
          </div>
        </div>

        <div>
          <h3 class="font-semibold text-slate-700 text-sm mb-2">新增客戶</h3>
          <div class="space-y-2">
            <input v-model="newCustomerName" type="text" placeholder="客戶名稱"
                   class="border border-slate-300 rounded-lg px-3 py-2 text-sm w-full" />
            <select v-model="newCustomerChain" class="border border-slate-300 rounded-lg px-3 py-2 text-sm w-full">
              <option value="">不歸類連鎖群組</option>
              <option v-for="g in chainGroups" :key="g" :value="g">{{ g }}</option>
            </select>
            <button @click="addCustomerSubmit" :disabled="savingCustomer"
                    class="bg-indigo-600 text-white text-sm px-4 py-2 rounded-lg w-full disabled:opacity-50">新增客戶</button>
          </div>
        </div>

        <div>
          <h3 class="font-semibold text-slate-700 text-sm mb-2">客戶連鎖群組歸類</h3>
          <div class="space-y-2 max-h-96 overflow-y-auto">
            <div v-for="c in customers" :key="c.id" class="flex items-center justify-between gap-2 border border-slate-200 rounded-lg px-3 py-2">
              <span class="text-sm text-slate-700">{{ c.name }}</span>
              <select :value="c.chainGroup" @change="assignChain(c, $event.target.value)"
                      class="border border-slate-300 rounded-lg px-2 py-1 text-xs">
                <option value="">無</option>
                <option v-for="g in chainGroups" :key="g" :value="g">{{ g }}</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  `
};

createApp(App).mount('#app');
</script>
</body>
</html>
